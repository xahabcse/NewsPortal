name: CI - Dev (build + auto-merge to main)

on:
  push:
    branches: [dev]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Typecheck Hono API
        working-directory: src/NewsPortal.Api.Hono
        run: |
          npm ci
          npm run typecheck

      - name: Build React Client
        working-directory: src/NewsPortal.Client
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

  create-pr:
    name: Create PR to Main and Auto-Merge
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR and enable auto-merge
        run: |
          COMMITS=$(gh api repos/${{ github.repository }}/compare/main...dev --jq '.ahead_by')
          if [ "$COMMITS" -eq 0 ]; then
            echo "No new commits between dev and main. Skipping PR creation."
            exit 0
          fi

          PR=$(gh pr list --head dev --base main --json number -q '.[0].number')
          if [ -z "$PR" ]; then
            gh pr create --head dev --base main \
              --title "chore: merge dev into main" \
              --body "Automated PR: build passed on dev branch — auto-merging into main to trigger Cloudflare deploys."
            PR=$(gh pr list --head dev --base main --json number -q '.[0].number')
          fi
          gh pr merge "$PR" --merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
