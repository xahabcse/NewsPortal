name: CI - Dev (build + auto-merge to main)

on:
  push:
    branches: [dev]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Typecheck Hono API
        working-directory: src/NewsPortal.Api.Hono
        run: |
          npm ci
          npm run typecheck

      - name: Build React Client
        working-directory: src/NewsPortal.Client
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  version:
    name: Bump version
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v5
        with:
          ref: dev
          fetch-depth: 0   # full history so the commit range can be inspected

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Compute & apply version bump
        id: bump
        env:
          BUMP_RANGE: ${{ github.event.before }}..${{ github.sha }}
        run: node scripts/version-bump.cjs

      # Pushed with the default GITHUB_TOKEN, which by design does NOT trigger a
      # new workflow run — so the release commit can't cause an infinite loop.
      # create-pr (below) still merges the now-bumped dev into main and deploys.
      - name: Commit & push release bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/NewsPortal.Client/src/version.json src/NewsPortal.Client/package.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]"
          git push origin HEAD:dev

  create-pr:
    name: Create PR to Main and Auto-Merge
    needs: [build, version]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create PR and enable auto-merge
        run: |
          COMMITS=$(gh api repos/${{ github.repository }}/compare/main...dev --jq '.ahead_by')
          if [ "$COMMITS" -eq 0 ]; then
            echo "No new commits between dev and main. Skipping PR creation."
            exit 0
          fi

          PR=$(gh pr list --head dev --base main --json number -q '.[0].number')
          if [ -z "$PR" ]; then
            gh pr create --head dev --base main \
              --title "chore: merge dev into main" \
              --body "Automated PR: build passed on dev branch — auto-merging into main to trigger Cloudflare deploys."
            PR=$(gh pr list --head dev --base main --json number -q '.[0].number')
          fi
          gh pr merge "$PR" --merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
