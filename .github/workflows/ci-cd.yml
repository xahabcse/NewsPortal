name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - ci-cd
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_to_prod:
        description: 'Deploy to production'
        required: false
        default: 'false'

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}/api
  IMAGE_NAME_MCPSERVER: ${{ github.repository }}/mcpserver
  IMAGE_NAME_WEB: ${{ github.repository }}/web

jobs:
  # Job 1: Build and Test .NET Application
  build-and-test:
    name: Build & Test .NET
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore NewsPortal.sln

      - name: Build solution
        run: dotnet build NewsPortal.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test NewsPortal.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
        continue-on-error: true

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/test-results.trx'

  # Job 2: Build and Push Docker Images
  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/NewsPortal.Api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:buildcache,mode=max

      - name: Extract metadata for MCP Server
        id: meta-mcpserver
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MCPSERVER }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push MCP Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/NewsPortal.McpServer/Dockerfile
          push: true
          tags: ${{ steps.meta-mcpserver.outputs.tags }}
          labels: ${{ steps.meta-mcpserver.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MCPSERVER }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MCPSERVER }}:buildcache,mode=max

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./src/NewsPortal.Client
          file: ./src/NewsPortal.Client/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:buildcache,mode=max

  # Job 3: Deploy to Production (Manual trigger or main branch push)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-docker-images
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to_prod == 'true')

    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env file for production
        run: |
          cat > .env.production << EOF
          # Database Configuration
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}

          MONGO_USER=${{ secrets.MONGO_USER }}
          MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
          MONGO_DB=${{ secrets.MONGO_DB }}

          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}

          # Seq Configuration
          SEQ_ADMIN_PASSWORD=${{ secrets.SEQ_ADMIN_PASSWORD }}

          # Application Configuration
          ASPNETCORE_ENVIRONMENT=Production
          API_PORT=8080
          WEB_PORT=80

          # CORS Configuration
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          VITE_API_URL=${{ secrets.VITE_API_URL }}

          # External API Keys (Optional)
          NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}
          GNEWS_API_KEY=${{ secrets.GNEWS_API_KEY }}
          BING_SEARCH_API_KEY=${{ secrets.BING_SEARCH_API_KEY }}

          # Docker Registry
          DOCKER_REGISTRY=${{ env.REGISTRY }}
          DOCKER_USERNAME=${{ github.repository_owner }}
          IMAGE_TAG=latest
          EOF

      - name: Copy files to server
        run: |
          scp -r docker-compose.prod.yml .env.production ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/newsportal/

      - name: Deploy application
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            cd ~/newsportal

            # Login to GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml --env-file .env.production pull

            # Stop and remove old containers
            docker compose -f docker-compose.prod.yml --env-file .env.production down

            # Start new containers
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d

            # Clean up old images
            docker image prune -af

            # Show running containers
            docker compose -f docker-compose.prod.yml ps
          ENDSSH

      - name: Health check
        run: |
          sleep 30
          curl -f ${{ secrets.PRODUCTION_URL }}/health || exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deployment to production successful!"
          echo "URL: ${{ secrets.PRODUCTION_URL }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Deployment to production failed!"
          exit 1
