name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/newsportal-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/newsportal-web-client
  MCP_IMAGE: ghcr.io/${{ github.repository_owner }}/newsportal-mcp

jobs:
  # ================================================================
  # Job 1: Build & Test (.NET + Frontend)
  # ================================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore NewsPortal.sln

      - name: Build solution
        run: dotnet build NewsPortal.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test NewsPortal.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx" || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/test-results.trx'
          retention-days: 7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: src/NewsPortal.Client
        run: npm ci

      - name: Build frontend
        working-directory: src/NewsPortal.Client
        run: npm run build

  # ================================================================
  # Job 2: Build Docker Images & Push to GHCR
  # ================================================================
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/NewsPortal.Api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & Push Web Client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/NewsPortal.Client/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build & Push MCP Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/NewsPortal.McpServer/Dockerfile
          push: true
          tags: |
            ${{ env.MCP_IMAGE }}:latest
            ${{ env.MCP_IMAGE }}:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

  # ================================================================
  # Job 3: Deploy to Production
  # ================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: |
      always() &&
      (needs.docker-build-push.result == 'success' || needs.docker-build-push.result == 'skipped') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
      )
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract short SHA
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Create .env on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'mkdir -p ~/newsportal/logs/mcp'
          cat > /tmp/newsportal.env <<ENVEOF
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          MONGO_USER=${{ secrets.MONGO_USER }}
          MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          DOCKER_USERNAME=${{ github.repository_owner }}
          IMAGE_TAG=${{ steps.meta.outputs.sha_short }}
          WEB_PORT=80
          ASPNETCORE_ENVIRONMENT=Production
          ENVEOF
          sed -i 's/^[[:space:]]*//' /tmp/newsportal.env
          scp -i ~/.ssh/deploy_key /tmp/newsportal.env ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/newsportal/.env
          rm -f /tmp/newsportal.env

      - name: Copy compose file to server
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/newsportal/docker-compose.prod.yml

      - name: Login to GHCR on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Deploy containers
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            cd ~/newsportal
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
          '

      - name: Wait for services to start
        run: sleep 30

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            curl -sf http://localhost:80/healthz || exit 1
            echo "Web health check passed"
            docker compose -f ~/newsportal/docker-compose.prod.yml ps --format "table {{.Name}}\t{{.Status}}" | grep -v "NAME"
          '

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ================================================================
  # Job 4: Smoke Test
  # ================================================================
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Smoke test — Health endpoint
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:80/healthz)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health endpoint: OK ($STATUS)"
            else
              echo "❌ Health endpoint: FAILED ($STATUS)"
              exit 1
            fi
          '

      - name: Smoke test — API health
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:80/api/v1/NewsSources)
            if [ "$STATUS" = "200" ]; then
              echo "✅ API NewsSources: OK ($STATUS)"
            else
              echo "❌ API NewsSources: FAILED ($STATUS)"
              exit 1
            fi
          '

      - name: Smoke test — Container health
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            cd ~/newsportal
            UNHEALTHY=$(docker compose -f docker-compose.prod.yml ps | grep -c "unhealthy" || true)
            if [ "$UNHEALTHY" -gt 0 ]; then
              echo "❌ $UNHEALTHY unhealthy containers found"
              docker compose -f docker-compose.prod.yml ps
              exit 1
            else
              echo "✅ All containers healthy"
              docker compose -f docker-compose.prod.yml ps --format "table {{.Name}}\t{{.Status}}"
            fi
          '

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
