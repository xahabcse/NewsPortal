name: TEST - Bangla Tribune scrape (datacenter runner)

# Throwaway probe: does a real headless Chromium running on a GitHub Actions
# (Azure datacenter) IP get past Bangla Tribune's Cloudflare challenge, or is it
# blocked like every other datacenter fetcher we tested? Manual-trigger only.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Runner public IP (for the record)
        run: curl -s https://ifconfig.me || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm i playwright@latest >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Probe Bangla Tribune
        run: |
          cat > probe.mjs <<'EOF'
          import { chromium } from 'playwright';

          // 1) Get a fresh article URL from the RSS feed (the /feed/ path is NOT challenged).
          let url = 'https://www.banglatribune.com/';
          try {
            const feed = await (await fetch('https://www.banglatribune.com/feed/')).text();
            const links = [...feed.matchAll(/<link>\s*([^<\s]+)\s*<\/link>/g)].map(m => m[1]);
            url = links.find(u => /banglatribune\.com\/[^/]+\/.*\/\d+\//.test(u)) || links.find(u => /\/\d+\//.test(u)) || url;
          } catch (e) { console.log('feed fetch error:', e.message); }
          console.log('TEST URL:', url);

          const browser = await chromium.launch({
            headless: true,
            args: ['--disable-blink-features=AutomationControlled', '--no-sandbox'],
          });
          const ctx = await browser.newContext({
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
            locale: 'en-US',
            viewport: { width: 1280, height: 800 },
          });
          const page = await ctx.newPage();

          let firstStatus = 0;
          page.on('response', r => { if (r.url() === url && !firstStatus) firstStatus = r.status(); });

          try {
            await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
          } catch (e) { console.log('goto error:', e.message); }

          // Give Cloudflare's managed challenge time to run its JS and (maybe) clear.
          await page.waitForTimeout(18000);

          const title = await page.title().catch(() => '');
          const html = await page.content().catch(() => '');
          const challenged = /Just a moment|Performing security verification|Checking your browser|cf-chl|Enable JavaScript and cookies|Attention Required/i.test(html);

          let body = '';
          for (const sel of ['.jw_detail_content_holder', 'article', 'main', '[itemprop="articleBody"]']) {
            try { const t = await page.$eval(sel, el => el.innerText); if (t && t.length > body.length) body = t; } catch {}
          }

          console.log('--- RESULT ---');
          console.log('initialHTTPStatus:', firstStatus);
          console.log('finalURL:', page.url());
          console.log('title:', title);
          console.log('challenged:', challenged);
          console.log('htmlLen:', html.length);
          console.log('bodyChars:', body.length);
          console.log('bodySample:', body.slice(0, 200).replace(/\s+/g, ' '));
          const verdict = body.length > 300 && !challenged ? 'PASS ✅ (got article body)'
            : challenged ? 'BLOCKED ❌ (Cloudflare challenge)'
            : 'UNCLEAR ⚠️ (no challenge text but no body)';
          console.log('VERDICT:', verdict);

          await browser.close();
          EOF
          node probe.mjs
