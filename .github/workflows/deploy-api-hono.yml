name: Deploy Hono API to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'src/NewsPortal.Api.Hono/**'
      - '.github/workflows/deploy-api-hono.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Workers
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/NewsPortal.Api.Hono

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/NewsPortal.Api.Hono/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Apply D1 Migrations (remote)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/NewsPortal.Api.Hono
          command: d1 migrations apply newsportal --remote

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/NewsPortal.Api.Hono
          command: deploy --minify
