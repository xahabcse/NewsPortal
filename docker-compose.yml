services:
  # PostgreSQL - Main Database
  postgres:
    image: postgres:15-alpine
    container_name: newsportal-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-newsadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-YourSecurePassword123}
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsadmin} -d ${POSTGRES_DB:-newsportal}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - newsportal-network


  # Redis - Caching Layer
  redis:
    image: redis:7-alpine
    container_name: newsportal-cache
    restart: always
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - newsportal-network

  # Web Application
  web:
    build:
      context: .
      dockerfile: src/NewsPortal.Web/Dockerfile
    image: newsportal-web:latest
    container_name: newsportal-web
    restart: always
    ports:
      - "${WEB_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${POSTGRES_DB:-newsportal};Username=${POSTGRES_USER:-newsadmin};Password=${POSTGRES_PASSWORD:-YourSecurePassword123};Include Error Detail=true
      - ConnectionStrings__MongoDB=mongodb://${MONGO_USER:-mongouser}:${MONGO_PASSWORD:-MongoPassword123}@host.docker.internal:27017/newsportal?authSource=admin
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
    volumes:
      - ./logs/web:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - newsportal-network

  # MCP Server (Background News Fetching)
  mcpserver:
    build:
      context: .
      dockerfile: src/NewsPortal.McpServer/Dockerfile
    image: newsportal-mcp:latest
    container_name: newsportal-mcp
    restart: always
    environment:
      - DOTNET_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${POSTGRES_DB:-newsportal};Username=${POSTGRES_USER:-newsadmin};Password=${POSTGRES_PASSWORD:-YourSecurePassword123};Include Error Detail=true
      - ConnectionStrings__MongoDB=mongodb://${MONGO_USER:-mongouser}:${MONGO_PASSWORD:-MongoPassword123}@host.docker.internal:27017/newsportal?authSource=admin
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
    volumes:
      - ./logs/mcp:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - newsportal-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  newsportal-network:
    driver: bridge
