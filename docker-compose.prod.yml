# ==============================================================================
# NewsPortal — Production Docker Compose
# ==============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# This is a standalone production compose file. It differs from the base
# docker-compose.yml (used for local testing) in the following ways:
#   - Database ports are NOT exposed to the host (internal-only)
#   - Pre-built images from GHCR instead of local builds
#   - JSON log rotation on all containers
#   - Health checks on all application containers
#   - Resource limits on all containers
#   - Seq authentication enabled
# ==============================================================================

services:
  # PostgreSQL - Main Database
  postgres:
    image: postgres:13-alpine
    container_name: newsportal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port mapping — only accessible within Docker network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-newsportal}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - newsportal-network

  # MongoDB - Image Storage (GridFS)
  mongodb:
    image: mongo:4.4
    container_name: newsportal-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    # No host port mapping — only accessible within Docker network
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - newsportal-network

  # Redis - Caching Layer
  redis:
    image: redis:7-alpine
    container_name: newsportal-cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 100mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    # No host port mapping — only accessible within Docker network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - newsportal-network

  # Seq - Centralized Logging (authentication enabled)
  seq:
    image: datalust/seq:latest
    container_name: newsportal-seq
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=false
    volumes:
      - seq_data:/data
    # No host port mapping — only accessible within Docker network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - newsportal-network

  # Web Application (React UI + Nginx Reverse Proxy)
  web:
    image: ghcr.io/${DOCKER_USERNAME:-sujoncep}/newsportal-web-client:${IMAGE_TAG:-latest}
    container_name: newsportal-web-client
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/healthz" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - newsportal-network

  # Backend API
  api:
    image: ghcr.io/${DOCKER_USERNAME:-sujoncep}/newsportal-api:${IMAGE_TAG:-latest}
    container_name: newsportal-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AllowedHosts=*
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${POSTGRES_DB:-newsportal};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=false
      - ConnectionStrings__MongoDB=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/newsportal?authSource=admin
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD},abortConnect=false
      - ConnectionStrings__Seq=http://seq:5341
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS:-http://localhost:5000}
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - newsportal-network

  # MCP Server (Background News Fetching)
  mcpserver:
    image: ghcr.io/${DOCKER_USERNAME:-sujoncep}/newsportal-mcp:${IMAGE_TAG:-latest}
    container_name: newsportal-mcp
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=${POSTGRES_DB:-newsportal};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=false
      - ConnectionStrings__MongoDB=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/newsportal?authSource=admin
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD},abortConnect=false
      - ConnectionStrings__Seq=http://seq:5341
    healthcheck:
      test: [ "CMD-SHELL", "pidof dotnet || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    volumes:
      - ./logs/mcp:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - newsportal-network

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  seq_data:
    driver: local

networks:
  newsportal-network:
    driver: bridge
