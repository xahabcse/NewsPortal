# Docker Compose for Production Deployment
# All services run in Docker containers
# Connection strings use Docker service names
# Database ports are NOT exposed externally (security)

version: '3.8'

networks:
  newsportal-prod:
    driver: bridge

volumes:
  postgres_prod_data:
  mongodb_prod_data:
  mongodb_prod_config:
  redis_prod_data:
  seq_prod_data:

services:
  # PostgreSQL Database (Internal only - no external port)
  postgres:
    image: postgres:15-alpine
    container_name: newsportal-prod-postgres
    restart: always
    # NO external ports exposed for security
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - newsportal-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # MongoDB Database (Internal only - no external port)
  mongodb:
    image: mongo:4.4
    container_name: newsportal-prod-mongodb
    restart: always
    # NO external ports exposed for security
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongodb_prod_data:/data/db
      - mongodb_prod_config:/data/configdb
    networks:
      - newsportal-prod
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Redis Cache (Internal only - no external port)
  redis:
    image: redis:7-alpine
    container_name: newsportal-prod-redis
    restart: always
    # NO external ports exposed for security
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    networks:
      - newsportal-prod
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Seq Logging Platform (Optional - can be disabled in production)
  seq:
    image: datalust/seq:latest
    container_name: newsportal-prod-seq
    restart: always
    ports:
      - "8081:80"      # Seq UI (consider restricting to internal network)
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    volumes:
      - seq_prod_data:/data
    networks:
      - newsportal-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ASP.NET Core API
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_USERNAME:-sujoncep}/newsportal-api:${IMAGE_TAG:-latest}
    container_name: newsportal-prod-api
    restart: always
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__MongoDB: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      ConnectionStrings__Seq: "http://seq:80"
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_healthy
    networks:
      - newsportal-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # MCP Server (Background Jobs)
  mcpserver:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_USERNAME:-sujoncep}/newsportal-mcpserver:${IMAGE_TAG:-latest}
    container_name: newsportal-prod-mcpserver
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__MongoDB: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      ConnectionStrings__Seq: "http://seq:80"
      NewsApi__ApiKey: ${NEWS_API_KEY:-}
      GNewsApi__ApiKey: ${GNEWS_API_KEY:-}
      BingSearch__ApiKey: ${BING_SEARCH_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - newsportal-prod
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # React Frontend (Nginx)
  web:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_USERNAME:-sujoncep}/newsportal-web:${IMAGE_TAG:-latest}
    container_name: newsportal-prod-web
    restart: always
    ports:
      - "${WEB_PORT:-80}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - api
    networks:
      - newsportal-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
