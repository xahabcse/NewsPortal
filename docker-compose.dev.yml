# Docker Compose for Local Development
# Use this when running the .NET app from Visual Studio (F5)
# Only runs infrastructure: PostgreSQL, MongoDB, Redis, Seq
# Connection strings should use "localhost" from your .NET app

version: '3.8'

networks:
  newsportal-dev:
    driver: bridge

volumes:
  postgres_dev_data:
  mongodb_dev_data:
  mongodb_dev_config:
  redis_dev_data:
  seq_dev_data:

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: newsportal-dev-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-newsadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-YourSecurePassword123}
      POSTGRES_DB: ${POSTGRES_DB:-newsportal}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - newsportal-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # MongoDB Database
  mongodb:
    image: mongo:4.4
    container_name: newsportal-dev-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-MongoPassword123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-newsportal}
    volumes:
      - mongodb_dev_data:/data/db
      - mongodb_dev_config:/data/configdb
    networks:
      - newsportal-dev
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: newsportal-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    networks:
      - newsportal-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  # Seq Logging Platform
  seq:
    image: datalust/seq:latest
    container_name: newsportal-dev-seq
    restart: unless-stopped
    ports:
      - "5341:80"      # Seq UI
      - "5342:5341"    # Ingestion endpoint
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seq_dev_data:/data
    networks:
      - newsportal-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
