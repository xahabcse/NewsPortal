# ============================================================================
# Monitoring Stack - Windows Version (Docker Desktop)
# ============================================================================
# For Windows with Docker Desktop
# Run with: docker-compose -f docker-compose.yml -f docker-compose.monitoring.windows.yml up -d
#
# Note: Some exporters (node-exporter, promtail) are Linux-only and are disabled.
# cAdvisor works on Windows but with limited metrics.

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: newsportal-prometheus
    restart: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus-windows.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - newsportal-network

  grafana:
    image: grafana/grafana:11.2.2
    container_name: newsportal-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - newsportal-network

  loki:
    image: grafana/loki:3.1.1
    container_name: newsportal-loki
    restart: always
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - newsportal-network

  # Promtail is disabled on Windows - use Docker's built-in logging instead
  # Logs will still be available in Grafana/Loki from Docker's json-file driver

  # Node Exporter is disabled on Windows (Linux-only)

  # cAdvisor for Windows - limited metrics but functional
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: newsportal-cadvisor
    restart: always
    volumes:
      # Windows Docker Desktop compatible paths
      - //./pipe/docker_engine://./pipe/docker_engine:ro
    ports:
      - "8088:8080"
    networks:
      - newsportal-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: newsportal-postgres-exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-newsportal}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - newsportal-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: newsportal-redis-exporter
    restart: always
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - newsportal-network

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    container_name: newsportal-mongodb-exporter
    restart: always
    command:
      - --mongodb.uri=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/admin
      - --collect-all
    ports:
      - "9216:9216"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - newsportal-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  newsportal-network:
    driver: bridge
