name = "newsportal-api-hono"
main = "src/index.ts"
compatibility_date = "2026-05-09"

# ----------------------------------------------------------------------------
# Non-secret env vars (visible in dashboard, fine to commit)
# ----------------------------------------------------------------------------
[vars]
ADMIN_EMAIL = "admin@newsportal.local"
CORS_ORIGINS = "http://localhost:5173,http://localhost:5000,https://newsportal-client.pages.dev"
PUBLIC_BASE_URL = "https://newsportal-api-hono.sujoncep.workers.dev"
CLOUDINARY_CLOUD_NAME = "drwezeylt"
CLOUDINARY_API_KEY = "438531457272342"

# ----------------------------------------------------------------------------
# Secrets — set via wrangler, never commit:
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put GOOGLE_CLIENT_ID
#   npx wrangler secret put GEMINI_API_KEY
#   npx wrangler secret put CLOUDINARY_API_SECRET
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# D1 Database (replaces PostgreSQL)
#   Create with: npx wrangler d1 create newsportal
#   Paste the returned database_id below.
# ----------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "newsportal"
database_id = "a8125a66-3c02-4973-803a-f50ac367eb0c"

# ----------------------------------------------------------------------------
# KV Namespace (replaces Redis cache)
#   Create with: npx wrangler kv namespace create CACHE_KV
#   Paste the returned id below.
# ----------------------------------------------------------------------------
[[kv_namespaces]]
binding = "CACHE_KV"
id = "65d4c284eb7048d9b2cea23f571c1779"

# ----------------------------------------------------------------------------
# Cron Triggers (Phase 5 — uncomment when ready)
# ----------------------------------------------------------------------------
# [triggers]
# crons = ["*/15 * * * *"]
