# Rate limiting zone for API requests (30 requests/second per IP)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # -----------------------------------------------------------
    # Gzip Compression
    # -----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # -----------------------------------------------------------
    # Security Headers
    # -----------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # -----------------------------------------------------------
    # Client Limits
    # -----------------------------------------------------------
    client_max_body_size 10m;

    # -----------------------------------------------------------
    # Health Check Endpoint (for Docker / load balancers)
    # -----------------------------------------------------------
    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # -----------------------------------------------------------
    # Favicon — suppress 404 logs
    # -----------------------------------------------------------
    location /favicon.ico {
        access_log off;
        log_not_found off;
        try_files $uri =204;
    }

    # -----------------------------------------------------------
    # Static Assets (Vite hashed filenames — immutable cache)
    # -----------------------------------------------------------
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # -----------------------------------------------------------
    # SPA — React Application
    # -----------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # No cache on index.html so app updates are picked up
        location = /index.html {
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # -----------------------------------------------------------
    # API Reverse Proxy
    # -----------------------------------------------------------
    location /api/ {
        # Rate limiting
        limit_req zone=api burst=60 nodelay;

        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Real IP forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # -----------------------------------------------------------
    # Error Pages
    # -----------------------------------------------------------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
